name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel in-progress builds for non-main branches (allow concurrent builds only on main)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: Build and Test
    uses: theandiman/recipe-management/.github/workflows/backend-java-ci.yml@2d6c963fd364bc373af4c91fdba3cd47b9996258
    permissions:
      contents: read
      actions: write
      packages: read

  cd:
    name: Deploy
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: theandiman/recipe-management/.github/workflows/backend-java-cloud-run-cd.yml@2d6c963fd364bc373af4c91fdba3cd47b9996258
    permissions:
      contents: write
      actions: write
      id-token: write
    with:
      service_name: recipe-ai-service
      artifact_registry_repository: recipe-ai
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
