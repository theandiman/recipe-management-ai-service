name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel in-progress builds for non-main branches (allow concurrent builds only on main)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: Build and Test
    uses: theandiman/recipe-management/.github/workflows/backend-java-ci.yml@main
    permissions:
      contents: read
      actions: write
      packages: read
    secrets: inherit

  cd:
    name: Deploy
    needs: ci
    uses: theandiman/recipe-management/.github/workflows/backend-java-cloud-run-cd.yml@main
    permissions:
      contents: write
      actions: write
    with:
      service_name: recipe-ai-service
      artifact_registry_repository: recipe-ai
    secrets: inherit
